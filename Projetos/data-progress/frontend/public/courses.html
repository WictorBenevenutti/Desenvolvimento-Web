<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<title>Data Progress - Cursos</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
margin:0;
padding:0;
}

.header{
background:#111;
color:white;
padding:15px;
font-size:22px;
}

.container{
max-width:1200px;
margin:auto;
padding:20px;
display:grid;
grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
gap:20px;
}

.course{
background:white;
border-radius:10px;
padding:15px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
cursor:pointer;
transition:0.2s;
}

.course:hover{
transform:scale(1.03);
}

.course img{
width:100%;
border-radius:8px;
}

.title{
font-size:18px;
margin-top:10px;
}

</style>

</head>

<body>

<div class="header">
📊 Data Progress
</div>

<div class="container" id="courses"></div>

<script>

async function loadCourses(){

const response = await fetch("http://localhost:3000/courses");

const courses = await response.json();

const container = document.getElementById("courses");

courses.forEach(course => {

const div = document.createElement("div");

div.className="course";

div.innerHTML = `
<img src="https://via.placeholder.com/300x150">
<div class="title">${course.title}</div>
`;

div.onclick=()=>{
window.location.href="course.html?id="+course.id;
};

container.appendChild(div);

});

}

loadCourses();

</script>

</body>

</html>
