<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Data Progress - Curso</title>

<style>

body{
margin:0;
font-family:Arial;
display:flex;
height:100vh;
}

.sidebar{
width:300px;
background:#111;
color:white;
overflow-y:auto;
padding:20px;
}

.module{
margin-bottom:20px;
}

.lesson{
cursor:pointer;
padding:5px;
margin-left:10px;
}

.lesson:hover{
background:#333;
}

.player{
flex:1;
display:flex;
justify-content:center;
align-items:center;
background:#f4f4f4;
}

iframe{
width:80%;
height:500px;
border:none;
}

</style>

</head>

<body>

<div class="sidebar" id="modules"></div>

<div class="player">
<iframe id="video"></iframe>
</div>

<script>

const params = new URLSearchParams(window.location.search);
const courseId = params.get("id");

async function loadCourse(){

const modulesRes = await fetch(`http://localhost:3000/courses/${courseId}/modules`);
const modules = await modulesRes.json();

const container = document.getElementById("modules");

for(const module of modules){

const moduleDiv = document.createElement("div");
moduleDiv.className="module";

moduleDiv.innerHTML=`<h3>${module.title}</h3>`;

container.appendChild(moduleDiv);

const lessonsRes = await fetch(`http://localhost:3000/modules/${module.id}/lessons`);
const lessons = await lessonsRes.json();

lessons.forEach(lesson => {

const lessonDiv = document.createElement("div");

lessonDiv.className="lesson";

lessonDiv.innerText=lesson.title;

lessonDiv.onclick=()=>{

document.getElementById("video").src=lesson.video_url;

};

moduleDiv.appendChild(lessonDiv);

});

}

}

loadCourse();

</script>

</body>

</html>
