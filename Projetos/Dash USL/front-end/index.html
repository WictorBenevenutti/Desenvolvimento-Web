<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Indicadores Internos</title>
    <link rel="shortcut icon" href="assets/logo.png" type="image/x-icon">
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/components/navbar.css">
    <link rel="stylesheet" href="css/components/index.css">
</head>
<body>
    <div id="navbar"></div>
    <main class="conteudo">
        <div class="bloco">
            <div id="relatorios">

            </div>
        </div>
        <div class="bloco">
            <div id="conferencias">

            </div>
        </div>
    </main>

    <script>
        fetch('components/navbar.html')
            .then(res => res.text())
            .then(data => {
            document.getElementById('navbar').innerHTML = data;
            });
    </script>
    <script>
        fetch('components/relatorios.html')
            .then(res => res.text())
            .then(data => {
            document.getElementById('relatorios').innerHTML = data;
            });
    </script>
    <script>
        fetch('components/conferencias.html')
            .then(res => res.text())
            .then(data => {
            document.getElementById('conferencias').innerHTML = data;
            });
    </script>
    <script src="js/pages.js"></script>

</body>
</html>
