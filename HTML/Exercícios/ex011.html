<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mídias em HTML5</title>
</head>
<body>
    <H1>Imagem dinâmica</H1>
    <p>Tente abrir esse site em vários dispositivos diferentes ou simplemente aumente e dimunua o tamanho do seu nagegador.</p>

    <picture>
        <source media="(max-width: 750px)" srcset="../Imagens/ex011/Foto_P.png"">
        <source media="(max-width: 1050px)" srcset="../Imagens/ex011/Foto_M.png">
        <img src="../Imagens/ex011/Foto_G.png">
    </picture>
    <h1>Reproduzindo Áudio</h1>
    <p>Vamos aprender a reproduzir áudios em HTML5.</p>
    <audio preload="metadata" autoplay controls loop>
        <source src="../Áudios/The Creepy Clown - Jeremy Korpas.mp3" type="audio/mpeg">
        <p>Infelizmente seu navegador não consegue reproduzir áudio.</p>
    </audio>
    
</body>
</html>
