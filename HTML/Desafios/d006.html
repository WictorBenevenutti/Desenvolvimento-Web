<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tags HTML</title>
</head>
<body>
    <H1>Tags em HTML</H1>
    <p>Em HTML5, podemos inserir os elementos da lista a seguir. Passe o mouse sobre os termos para descobrir qual tag deverá utilizar em cada caso.</p>
    <ul type="square">
        <li><a title="Use a tag <p>">Parágrafos</a></li>
        <li><a title="Use a tag <h1>">Títulos</a></li>
        <li><a title="Use a tag <img>">Imagens</a></li>
        <li><a title="Use a tag <abbr>">Abreviações</a></li>
        <li><a title="Use a tag <code>">Códigos-fonte</a></li>
        <li><a title="Use a tag <ol> junto com a tag <li>">Listas numeradas</a></li>
        <li><a title="Use a tag <ul> junto com a tag <li>">Listas com demarcadores</a></li>
    </ul>
</body>
</html>
